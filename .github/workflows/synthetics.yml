name: Datadog Synthetics

on:
  schedule:
    # Run every hour during business hours (NPT = UTC+5:45)
    # 6 AM - 6 PM NPT = 00:15 - 12:15 UTC
    - cron: '15 0-6,8-12 * * 1-5'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  synthetics:
    runs-on: ubuntu-latest
    if: ${{ secrets.DD_APP_KEY != '' && secrets.DD_API_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Datadog Synthetics CI
        uses: DataDog/synthetics-ci-github-action@v2
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          # If DD_SITE is not set, defaults to datadoghq.com
          site: ${{ vars.DD_SITE || 'datadoghq.com' }}
          # Test search query — selects all Synthetic tests tagged with this app
          test_search_query: 'app:e5-chronicles'
          # Files containing Synthetic test configurations (inline as fallback)
          config_path: '.github/synthetics.json'
          # Optional: override when triggered workflow_dispatch
          variables: |
            ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
          # Poll until tests finish (max 30 min)
          wait_for_minutes: 30
